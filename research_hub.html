    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://oliefagvnorzhlzvdfyw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saWVmYWd2bm9yemhsenZkZnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjUwNDcsImV4cCI6MjA5MTE0MTA0N30.KZlFA_e3ub3zZnEZFBTGnshvyC9L2SNcwrfH9BiBauU'
        );
        
        async function loadStats() {
            try {
                // جلب من scanned_skills (الجدول الموجود)
                const { count: skillsCount } = await supabase
                    .from('scanned_skills')
                    .select('*', { count: 'exact', head: true });
                
                // جلب من dead_links (الجدول الموجود)
                const { count: deadLinksCount } = await supabase
                    .from('dead_links')
                    .select('*', { count: 'exact', head: true });
                
                // التهديدات = المهارات الخطيرة (risk_level = dangerous)
                const { count: threatsCount } = await supabase
                    .from('scanned_skills')
                    .select('*', { count: 'exact', head: true })
                    .eq('risk_level', 'dangerous');
                
                // تحديث الأرقام
                document.getElementById('threats').innerText = threatsCount || 0;
                document.getElementById('skills').innerText = skillsCount || 0;
                document.getElementById('deadLinks').innerText = deadLinksCount || 0;
                document.getElementById('apiKeys').innerText = skillsCount || 0;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('threats').innerText = 'خطأ';
                document.getElementById('skills').innerText = 'خطأ';
                document.getElementById('deadLinks').innerText = 'خطأ';
                document.getElementById('apiKeys').innerText = 'خطأ';
            }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
    </script>
