    <script>
        async function loadStats() {
            try {
                const response = await fetch('https://freedlucas.pythonanywhere.com/api/stats');
                const data = await response.json();
                
                document.getElementById('threats').innerText = data.threats || 0;
                document.getElementById('skills').innerText = data.total_skills || 0;
                document.getElementById('deadLinks').innerText = data.dead_links || 0;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('threats').innerText = '?';
                document.getElementById('skills').innerText = '?';
                document.getElementById('deadLinks').innerText = '?';
            }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
    </script>
