    <script>
        // دالة لعرض رسالة الخطأ بشكل أنيق
        function showError(message) {
            const statusMsg = document.getElementById('statusMsg');
            if (statusMsg) {
                statusMsg.innerHTML = message;
                statusMsg.style.color = '#ff4444';
            }
            console.error(message);
        }

        async function loadStats() {
            // قائمة بمصادر البيانات (للتجربة)
            const dataSources = [
                'https://raw.githubusercontent.com/Freedingoxo/clawguardian-skill/main/data.json',
                'https://freedlucas.pythonanywhere.com/api/stats'
            ];
            
            for (const source of dataSources) {
                try {
                    console.log(`محاولة جلب البيانات من: ${source}`);
                    const response = await fetch(source);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    // التحقق من صحة البيانات
                    if (data && typeof data.total_skills !== 'undefined') {
                        document.getElementById('threats').innerText = data.threats || 0;
                        document.getElementById('skills').innerText = data.total_skills || 0;
                        document.getElementById('deadLinks').innerText = data.dead_links || 0;
                        
                        const statusMsg = document.getElementById('statusMsg');
                        if (statusMsg) {
                            statusMsg.innerHTML = '✅ بيانات حية (محدثة)';
                            statusMsg.style.color = '#00ff00';
                        }
                        return; // نجحت العملية، نخرج من الحلقة
                    }
                } catch (error) {
                    console.warn(`فشل جلب البيانات من ${source}:`, error);
                }
            }
            
            // إذا فشلت جميع المصادر
            showError('⚠️ تعذر تحميل البيانات. سيتم استخدام أرقام تقريبية.');
            // تعيين أرقام تقريبية كحل أخير
            document.getElementById('threats').innerText = '5';
            document.getElementById('skills').innerText = '8';
            document.getElementById('deadLinks').innerText = '2';
        }
        
        // تحميل البيانات فوراً
        loadStats();
        
        // تحديث البيانات كل 5 دقائق (لتقليل الضغط على الخوادم)
        setInterval(loadStats, 300000);
    </script>
