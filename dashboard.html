<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ClawGuardian - لوحة التحكم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .status-online {
            color: #00ff00;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: #FFD700;
        }
        .critical {
            color: #ff4444;
        }
        .warning {
            color: #ffcc00;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .refresh-btn {
            background: #FFD700;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ ClawGuardian - لوحة التحكم</h1>
        
        <div class="status-card">
            <div>حالة النظام:</div>
            <div class="status-online" id="status">🟢 ONLINE</div>
            <div id="lastUpdate">آخر تحديث: جاري التحميل...</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalThreats">0</div>
                <div>إجمالي التهديدات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="criticalThreats">0</div>
                <div>تهديدات خطيرة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="warnings">0</div>
                <div>تحذيرات</div>
            </div>
        </div>
        
        <h3>📋 آخر التهديدات المكتشفة</h3>
        <table id="threatsTable">
            <thead>
                <tr><th>الفئة</th><th>النمط</th><th>المصدر</th><th>التاريخ</th></tr>
            </thead>
            <tbody id="threatsBody">
                <tr><td colspan="4">جاري التحميل...</td></tr>
            </tbody>
        </table>
        
        <div class="footer">
            🔗 ClawGuardian v1.0 | مراقبة OpenClaw Skills
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://oliefagvnorzhlzvdfyw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saWVmYWd2bm9yemhsenZkZnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjUwNDcsImV4cCI6MjA5MTE0MTA0N30.KZlFA_e3ub3zZnEZFBTGnshvyC9L2SNcwrfH9BiBauU';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function loadStats() {
            const { data, error } = await supabase.from('detected_threats').select('*').order('detected_at', { ascending: false });
            if (data) {
                document.getElementById('totalThreats').innerText = data.length;
                document.getElementById('criticalThreats').innerText = data.filter(t => t.category === 'command_injection' || t.category === 'persistence').length;
                document.getElementById('warnings').innerText = data.filter(t => t.category === 'credential_theft' || t.category === 'data_exfiltration').length;
                document.getElementById('lastUpdate').innerHTML = `آخر تحديث: ${new Date().toLocaleString()}`;
                
                const tbody = document.getElementById('threatsBody');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">✅ لا توجد تهديدات - النظام آمن</td></tr>';
                } else {
                    tbody.innerHTML = data.slice(0, 20).map(t => `
                        <tr>
                            <td>${t.category}</td>
                            <td><code>${t.pattern}</code></td>
                            <td>${t.source}</td>
                            <td>${new Date(t.detected_at).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
            }
        }
        
        loadStats();
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
