<script>
    // ========== استبدل هذا الرابط برابط Pipedream الذي حصلت عليه ==========
    const PROXY_URL = "https://eoakj.pipedream.net/";  // <-- استبدله برابطك
    
    // دالة إرسال إلى البوت
    function sendToBot(message) {
        fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.text())
        .then(data => console.log('✅ تم الإرسال:', data))
        .catch(err => console.error('❌ خطأ:', err));
    }
    
    // اختبار فتح الصفحة
    sendToBot('📧 Page opened from email - EMP2026');
</script>
